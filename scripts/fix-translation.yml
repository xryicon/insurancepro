const fs = require('fs');
const path = require('path');

console.log('🚀 Fix-translations script is running!');

const srcDir = path.join(__dirname, '../src');
const translationFiles = ['en_translation.json', 'es_translation.json', 'nl_translation.json'];

function toReadableText(key) {
  console.log(`🔍 Converting key: "${key}"`);
  let readable = key.replace(/__/g, ' ').replace(/_/g, ' ');
  readable = readable
    .split(' ')
    .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
    .join(' ');
  readable = readable.replace(/ \& /g, ' & ').replace(/I18n/g, 'i18n');
  console.log(`🔍 Result: "${readable}"`);
  return readable;
}

translationFiles.forEach(file => {
  const filePath = path.join(srcDir, file);
  console.log(`📄 Processing file: ${filePath}`);

  if (!fs.existsSync(filePath)) {
    console.log(`⚠️ File not found: ${filePath}`);
    return;
  }

  let data;
  try {
    data = JSON.parse(fs.readFileSync(filePath, 'utf8'));
  } catch (err) {
    console.error(`❌ Failed to read ${filePath}:`, err);
    return;
  }

  const changes = [];
  for (const key in data) {
    const fixedValue = toReadableText(key);
    if (data[key] !== fixedValue) {
      changes.push({ file, key, oldValue: data[key], newValue: fixedValue });
      data[key] = fixedValue;
    }
  }

  if (changes.length > 0) {
    try {
      fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
      console.log(`✅ Fixed ${file}:`);
      changes.forEach(change => {
        console.log(`   - "${change.key}": "${change.oldValue}" → "${change.newValue}"`);
      });
    } catch (err) {
      console.error(`❌ Failed to save ${filePath}:`, err);
    }
  } else {
    console.log(`✅ No fixes needed for ${file}.`);
  }
});

console.log('🎉 Script finished!');
