const fs = require('fs');
const path = require('path');

// Path to your translation files in src/
const srcDir = path.join(__dirname, '../src');
const translationFiles = [
  'en_translation.json',
  'es_translation.json',
  'nl_translation.json'
];

// Function to convert snake_case to Title Case
function toReadableText(key) {
  // Replace double underscores with a single space (e.g., "fast__easy" → "fast easy")
  let readable = key.replace(/__/g, ' ');

  // Replace single underscores with spaces (e.g., "start_new_quote" → "start new quote")
  readable = readable.replace(/_/g, ' ');

  // Capitalize the first letter of each word
  readable = readable
    .split(' ')
    .map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase())
    .join(' ');

  // Special cases (e.g., "Fast & Easy" instead of "Fast  Easy")
  readable = readable.replace(/ \& /g, ' & ');
  readable = readable.replace(/I18n/g, 'i18n'); // Preserve acronyms

  return readable;
}

// Track changes for logging
const changes = [];

// Process each translation file
translationFiles.forEach(file => {
  const filePath = path.join(srcDir, file);

  // Skip if the file doesn't exist
  if (!fs.existsSync(filePath)) {
    console.log(`⚠️ File not found: ${filePath}`);
    return;
  }

  let data = JSON.parse(fs.readFileSync(filePath, 'utf8'));

  // Fix values that match their keys
  for (const key in data) {
    if (data[key] === key) {
      const fixedValue = toReadableText(key);
      changes.push({ file, key, oldValue: data[key], newValue: fixedValue });
      data[key] = fixedValue;
    }
  }

  // Save the file
  fs.writeFileSync(filePath, JSON.stringify(data, null, 2));
});

// Log changes
if (changes.length > 0) {
  console.log('✅ Fixed the following translations:');
  changes.forEach(change => {
    console.log(`  - ${change.file}: "${change.key}": "${change.oldValue}" → "${change.newValue}"`);
  });
} else {
  console.log('✅ No translations needed fixing.');
}
