name: Extract Text and Auto-Translate

on:
  push:
    paths:
      - 'src/**/*.{js,jsx}'  # Trigger when any JS/JSX file in src/ changes

jobs:
  extract-and-translate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1

      - name: Set up Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install @babel/parser @babel/traverse glob axios

      - name: Extract text from code
        run: node extract-text.js

      - name: Translate to Spanish and Dutch
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          const path = require('path');

          const sourcePath = 'public/locales/en/translation.json';
          let sourceTranslations;
          try {
            sourceTranslations = JSON.parse(fs.readFileSync(sourcePath, 'utf8'));
          } catch (parseError) {
            console.error('❌ Invalid JSON in source file:', parseError.message);
            process.exit(1);
          }

          const targets = [
            { lang: 'es', path: 'public/locales/es/translation.json' },
            { lang: 'nl', path: 'public/locales/nl/translation.json' }
          ];

          async function translateText(text, targetLang) {
            try {
              const response = await axios.post('https://libretranslate.de/translate', {
                q: text,
                source: 'en',
                target: targetLang,
              });
              return response.data.translatedText;
            } catch (error) {
              console.error(\`⚠️ Error translating text: \${text}\`, error.message);
              return text;
            }
          }

          async function translateAll() {
            for (const target of targets) {
              const translatedJSON = {};
              for (const [key, value] of Object.entries(sourceTranslations)) {
                translatedJSON[key] = await translateText(value, target.lang);
                await new Promise(resolve => setTimeout(resolve, 500));
              }
              const dir = path.dirname(target.path);
              if (!fs.existsSync(dir)) {
                fs.mkdirSync(dir, { recursive: true });
              }
              fs.writeFileSync(target.path, JSON.stringify(translatedJSON, null, 2));
              console.log(\`✅ Translated to \${target.lang}\`);
            }
          }

          translateAll().catch(console.error);
          "

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add public/locales/en/translation.json public/locales/es/translation.json public/locales/nl/translation.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-extract text and translate to Spanish and Dutch"
            git push
          else
            echo "No changes to commit."
          fi
