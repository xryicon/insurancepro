- name: Extract text from code
  run: |
    node -e "
    const parser = require('@babel/parser');
    const traverse = require('@babel/traverse').default;
    const glob = require('glob');
    const fs = require('fs');
    const path = require('path');

    const files = glob.sync('src/**/*.{js,jsx}');
    const extractedText = new Set();

    files.forEach((file) => {
      try {
        const content = fs.readFileSync(file, 'utf8');
        const ast = parser.parse(content, {
          sourceType: 'module',
          plugins: ['jsx'],
        });

        traverse(ast, {
          CallExpression(path) {
            // Look for t('...') calls
            if (
              path.node.callee.type === 'Identifier' &&
              path.node.callee.name === 't' &&
              path.node.arguments.length > 0 &&
              path.node.arguments[0].type === 'StringLiteral'
            ) {
              extractedText.add(path.node.arguments[0].value);
            }
          },
          JSXText(path) {
            const text = path.node.value.trim();
            if (text && !text.match(/^\s*$/)) {
              extractedText.add(text);
            }
          },
          StringLiteral(path) {
            if (
              path.node.value &&
              !path.node.value.startsWith('.') &&
              !path.node.value.startsWith('/') &&
              !path.node.value.includes('node_modules')
            ) {
              extractedText.add(path.node.value);
            }
          },
        });
      } catch (error) {
        console.error(\`Error processing file \${file}:\`, error.message);
      }
    });

    const translationJSON = {};
    extractedText.forEach((text) => {
      const key = text
        .replace(/\s+/g, '_')
        .replace(/[^a-zA-Z0-9_]/g, '')
        .toLowerCase();
      translationJSON[key] = text;
    });

    const outputDir = path.join(__dirname, 'src');
    if (!fs.existsSync(outputDir)) {
      fs.mkdirSync(outputDir, { recursive: true });
    }
    fs.writeFileSync(
      path.join(outputDir, 'en-translation.json'),
      JSON.stringify(translationJSON, null, 2)
    );
    console.log('✅ Extracted text and saved to src/en-translation.json');
    "
