name: Auto Extract and Translate

on:
  push:
    paths:
      - 'src/**/*.js'
      - 'src/**/*.jsx'

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0

      - name: Pull latest changes
        run: git pull --rebase origin main

      - name: Set up Node.js 24
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install axios @babel/parser @babel/traverse glob

      # ✅ FIRST PASS: Fix existing values
      - name: Fix translation values (first pass)
        run: node scripts/fix-translations.js

      # ✅ TRANSLATE: Extract new keys
      - name: Run translation script
        run: node scripts/translate.mjs

      # ✅ SECOND PASS: Fix any new underscores introduced by translate.mjs
      - name: Fix translation values (second pass)
        run: node scripts/fix-translations.js

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add src/en-translation.json src/es-translation.json src/nl-translation.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-extract, translate, and fix text (double pass)"
            git push https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
