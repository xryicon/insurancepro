name: Auto Extract and Translate

on:
  push:
    paths:
      - 'src/**/*.js'
      - 'src/**/*.jsx'

jobs:
  translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1
        with:
          token: ${{ secrets.PAT }}

      - name: Set up Node.js 24
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install axios @babel/parser @babel/traverse glob

      - name: Run translation script
        run: node scripts/translate.mjs

      - name: Commit changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add src/en-translation.json src/es-translation.json src/nl-translation.json
          if ! git diff --cached --quiet; then
            git commit -m "🤖 Auto-extract and translate text"
            git push https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name }}
          fi
