name: Auto Extract and Translate

on:
  push:
    paths:
      - 'src/**/*.{js,jsx}'

jobs:
  extract-and-translate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.1.1

      - name: Set up Node.js
        uses: actions/setup-node@v4.0.2
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install @babel/parser @babel/traverse glob axios

      - name: Extract text from code
        run: |
          node -e "
          const parser = require('@babel/parser');
          const traverse = require('@babel/traverse').default;
          const glob = require('glob');
          const fs = require('fs');
          const files = glob.sync('src/**/*.{js,jsx}');
          const extractedText = new Set();
          files.forEach((file) => {
            try {
              const content = fs.readFileSync(file, 'utf8');
              const ast = parser.parse(content, { sourceType: 'module', plugins: ['jsx'] });
              traverse(ast, {
                CallExpression(path) {
                  if (path.node.callee.type === 'Identifier' && path.node.callee.name === 't' && path.node.arguments.length > 0 && path.node.arguments[0].type === 'StringLiteral') {
                    extractedText.add(path.node.arguments[0].value);
                  }
                },
                JSXText(path) {
                  const text = path.node.value.trim();
                  if (text && !text.match(/^\s*$/)) extractedText.add(text);
                }
              });
            } catch (error) {
              console.error('Error processing file ' + file + ':', error.message);
            }
          });
          const translationJSON = {};
          Array.from(extractedText).forEach((text) => {
            const key = text.replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_]/g, '').toLowerCase();
            translationJSON[key] = text;
          });
          fs.writeFileSync('src/en-translation.json', JSON.stringify(translationJSON, null, 2));
          console.log('Extracted text and saved to src/en-translation.json');
          "

      - name: Translate to Spanish and Dutch
        run: |
          node -e "
          const axios = require('axios');
          const fs = require('fs');
          let enTranslations = JSON.parse(fs.readFileSync('src/en-translation.json', 'utf8'));
          const targets = [
            { lang: 'es', path: 'src/es-translation.json' },
            { lang: 'nl', path: 'src/nl-translation.json' }
          ];
          async function translateAll() {
            for (const target of targets) {
              const translatedJSON = {};
              for (const [key, value] of Object.entries(enTranslations)) {
                try {
                  const response = await axios.post('https://libretranslate.de/translate', {
                    q: value,
                    source: 'en',
                    target: target.lang
                  });
                  translatedJSON[key] = response.data.translatedText || value;
                } catch (error) {
                  translatedJSON[key] = value;
                }
                await new Promise(resolve => setTimeout(resolve, 500));
              }
              fs.writeFileSync(target.path, JSON.stringify(translatedJSON, null, 2));
            }
          }
          translateAll();
          "

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add src/en-translation.json src/es-translation.json src/nl-translation.json
          git diff --cached --quiet || git commit -m "Auto-extract and translate text"
          git push
